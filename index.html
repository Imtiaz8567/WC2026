<title>WC 2026 — Match Analyst</title>
<style>
:root {
  --gold:#c8a84b; --gold2:#e6c96e; --bg:#080d18; --s1:#0f1623; --s2:#151f30;
  --border:#1a2640; --text:#dde4f0; --dim:#6a7d99; --blue:#4a9eff;
  --green:#22c55e; --red:#f87171; --live:#ff6b35;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,'Inter','Segoe UI',sans-serif;font-size:14px;
  overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
header{
  background:linear-gradient(180deg,#0d1b35 0%,var(--s1) 100%);
  border-bottom:2px solid var(--gold);
  padding:env(safe-area-inset-top,16px) 16px 0;
  position:sticky;top:0;z-index:200
}
.header-row{display:flex;align-items:center;gap:10px;padding-bottom:14px}
.logo{font-size:26px}
.header-titles{flex:1}
.header-titles h1{font-size:16px;font-weight:800;color:var(--gold);letter-spacing:.5px}
.header-titles p{font-size:10px;color:var(--dim);margin-top:2px}
.clock{text-align:right}
.clock .time{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.clock .date{font-size:10px;color:var(--dim)}

/* nav tabs */
.tabs{display:flex;gap:6px;padding:0 0 12px}
.tab{flex:1;padding:7px 4px;border-radius:20px;border:1px solid var(--border);
  background:var(--s2);color:var(--dim);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .15s;letter-spacing:.3px}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── MAIN ── */
main{padding:14px 14px 100px;max-width:600px;margin:0 auto}

/* api key setup */
.setup-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.setup-card h2{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px}
.setup-card p{font-size:12px;color:var(--dim);margin-bottom:12px;line-height:1.6}
.input-row{display:flex;gap:8px;margin-bottom:10px}
input[type=text],input[type=password]{
  flex:1;background:#060b15;border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;padding:10px 12px;outline:none;
  font-family:monospace
}
input:focus{border-color:var(--gold)}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;letter-spacing:.5px;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2)}
.btn-dim{background:var(--border);color:var(--dim)}
.btn-blue{background:#1e3a6e;color:var(--blue);border:1px solid #2a4a8e}
.btn-green{background:#0f3020;color:var(--green);border:1px solid #1a5030}
.btn-red{background:#2a0a0a;color:var(--red);border:1px solid #4a1a1a}

/* match cards */
.day-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;padding:16px 0 8px;border-bottom:1px solid var(--border);
  margin-bottom:10px}
.match-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:10px;transition:border-color .2s}
.match-card.live-card{border-color:var(--live);box-shadow:0 0 16px rgba(255,107,53,.12)}
.match-card.analysis-card{border-color:var(--gold)}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.stage-badge{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.status-upcoming{color:var(--blue);background:#0d1f40}
.status-live{color:var(--live);background:#1f0f00;animation:pulse 2s infinite}
.status-ft{color:var(--green);background:#0a1f10}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.teams-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.team-block{text-align:center;flex:1}
.team-flag{font-size:30px;line-height:1}
.team-name{font-size:12px;font-weight:700;margin-top:4px;line-height:1.2}
.vs-sep{font-size:11px;color:var(--border);font-weight:700;flex-shrink:0}

.kickoff-row{text-align:center;margin-bottom:10px}
.kickoff-time{font-size:18px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
.countdown{font-size:11px;color:var(--dim);margin-top:2px}
.countdown.soon{color:#fbbf24}

.card-actions{display:flex;gap:6px}
.action-btn{flex:1;padding:8px 6px;border-radius:8px;border:none;cursor:pointer;
  font-size:11px;font-weight:700;text-align:center;transition:all .15s}
.action-btn:disabled{opacity:.35;cursor:default}
.btn-pre{background:#0d1f40;color:var(--blue);border:1px solid #1a3060}
.btn-post{background:#0a1a10;color:var(--green);border:1px solid #1a4020}
.btn-notify{background:#1a1500;color:#fbbf24;border:1px solid #3a3000}
.btn-notify.active{background:#2a2000;border-color:var(--gold)}

/* analysis panel */
.analysis-panel{background:var(--bg);border-radius:0;padding:0}
.analysis-header{background:linear-gradient(135deg,#0d1b35,#080d18);
  border-bottom:2px solid var(--gold);padding:16px;text-align:center;
  position:sticky;top:72px;z-index:100}
.analysis-type-badge{font-size:9px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:8px}
.badge-pre{color:var(--blue)}
.badge-post{color:var(--green)}
.analysis-teams{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:6px}
.analysis-team{text-align:center}
.analysis-flag{font-size:32px}
.analysis-tname{font-size:13px;font-weight:700;margin-top:4px}
.analysis-vs{color:var(--border);font-weight:700}
.analysis-meta{font-size:10px;color:var(--dim);margin-top:4px}
.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  background:var(--border);border:none;color:var(--dim);border-radius:8px;
  padding:6px 10px;cursor:pointer;font-size:12px;font-weight:700}

.analysis-body{padding:16px}
.loading-state{text-align:center;padding:48px 20px}
.loading-icon{font-size:40px;margin-bottom:14px}
.loading-text{color:var(--gold);font-weight:700;margin-bottom:6px}
.loading-sub{color:var(--dim);font-size:12px}
.progress-track{margin-top:20px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.progress-bar{height:100%;background:var(--gold);border-radius:1px;width:30%;
  animation:slide 1.8s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

.md-content{}
.md-h2{font-size:13px;font-weight:800;color:var(--gold);margin:20px 0 8px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.md-h3{font-size:12px;font-weight:700;color:var(--blue);margin:12px 0 6px}
.md-bullet{font-size:13px;color:#a0b4cc;padding-left:14px;margin-bottom:3px;
  position:relative;line-height:1.6}
.md-bullet::before{content:'·';position:absolute;left:4px;color:var(--gold)}
.md-p{font-size:13px;color:#96aac0;margin-bottom:5px;line-height:1.7}
.md-bold{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.md-gap{height:6px}
.error-box{background:#1a0505;border:1px solid #4a1515;border-radius:8px;
  padding:14px;color:var(--red);font-size:12px;line-height:1.6}

/* permission banner */
.perm-banner{background:#1a1200;border:1px solid #3a2800;border-radius:10px;
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.perm-banner .icon{font-size:22px;flex-shrink:0}
.perm-banner .text{flex:1;font-size:12px;color:#fbbf24;line-height:1.5}
.perm-banner .text strong{color:#f59e0b;display:block;margin-bottom:2px}

/* empty state */
.empty{text-align:center;padding:56px 20px;color:var(--dim)}
.empty .icon{font-size:48px;margin-bottom:14px;opacity:.5}
.empty p{font-size:13px}

/* schedule list */
.sched-date{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;padding:14px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sched-row{display:flex;align-items:center;gap:10px;padding:9px 10px;
  background:var(--s1);border-radius:8px;margin-bottom:6px;cursor:pointer;
  border:1px solid var(--border)}
.sched-row:hover{border-color:var(--gold)}
.sched-grp{font-size:9px;font-weight:700;color:var(--gold);width:22px;flex-shrink:0;text-align:center}
.sched-teams{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.sched-time{font-size:11px;color:var(--blue);font-variant-numeric:tabular-nums;flex-shrink:0}
.sched-notif{font-size:16px;flex-shrink:0}

/* settings */
.settings-section{margin-bottom:24px}
.settings-label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:10px}
.settings-row{display:flex;align-items:center;gap:12px;
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;margin-bottom:8px}
.settings-row .icon{font-size:20px;flex-shrink:0}
.settings-row .info{flex:1}
.settings-row .info strong{font-size:13px;color:var(--text);display:block}
.settings-row .info span{font-size:11px;color:var(--dim);margin-top:2px;display:block}
.settings-row .action{flex-shrink:0}

/* bottom padding for safe area */
.safe-bottom{height:env(safe-area-inset-bottom,20px)}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">⚽</div>
    <div class="header-titles">
      <h1>FIFA WORLD CUP 2026</h1>
      <p id="headerSub">Match Analyst · BST (UTC+6)</p>
    </div>

      <div class="time" id="clockTime">--:--</div>

</header>

// DATA

// All times stored as UTC milliseconds. BST = UTC+6.
// Derived from official ET schedule (EDT = UTC-4). BST = ET + 10h.

const FLAGS = {

function f(y,mo,d,h,mi){ // UTC timestamp from components
  return Date.UTC(y,mo-1,d,h,mi,0);
}
// BST = UTC+6 → to get UTC from BST time, subtract 6 hours
// ET (EDT) = UTC-4 → to get UTC from ET time, add 4 hours

  // id, group, home, away, kickoffUTC, stage, venue

  // Jun 14 – ET 19:00 = UTC 23:00
  {id:11,g:"E",h:"Ivory Coast",a:"Ecuador",k:f(2026,6,14,23,0),s:"Group Stage",v:"Philadelphia"},
  // Jun 14 – ET 22:00 = UTC Jun 15 02:00
  {id:12,g:"F",h:"Sweden",a:"Tunisia",k:f(2026,6,15,2,0),s:"Group Stage",v:"Monterrey"},
  // Jun 15 – ET 12:00 = UTC 16:00
  {id:13,g:"H",h:"Spain",a:"Cape Verde",k:f(2026,6,15,16,0),s:"Group Stage",v:"Atlanta"},
  // Jun 15 – ET 15:00 = UTC 19:00
  {id:14,g:"G",h:"Belgium",a:"Egypt",k:f(2026,6,15,19,0),s:"Group Stage",v:"Seattle"},
  // Jun 15 – ET 18:00 = UTC 22:00

// TIME UTILS — BST = UTC+6
// ═══════════════════════════════════════════════════════════════
const BST_OFFSET = 6 * 60 * 60 * 1000;

function nowBST(){ return Date.now() }

function toBSTStr(utcMs, opts={}){
  return new Date(utcMs).toLocaleString('en-GB', {
    timeZone:'Asia/Dhaka', ...opts
  });
}
function bstDateKey(utcMs){
  return new Date(utcMs).toLocaleDateString('en-GB', {timeZone:'Asia/Dhaka',
    weekday:'short', day:'2-digit', month:'short'});
}
function bstTimeStr(utcMs){
  return new Date(utcMs).toLocaleTimeString('en-GB', {timeZone:'Asia/Dhaka',
    hour:'2-digit', minute:'2-digit', hour12:true});
}
function isSameBSTDay(utcMs){
  const a = new Date(utcMs).toLocaleDateString('en-GB',{timeZone:'Asia/Dhaka'});
  const b = new Date().toLocaleDateString('en-GB',{timeZone:'Asia/Dhaka'});
  return a === b;
}

// ═══════════════════════════════════════════════════════════════
// MATCH STATUS
// ═══════════════════════════════════════════════════════════════
function matchStatus(m){
  const now = Date.now();
  const pre = m.k - now; // ms to kickoff
  const post = now - m.k; // ms after kickoff
  if(pre > 0) return {type:'upcoming', msPre:pre};
  if(post < 110*60*1000) return {type:'live', msPost:post};
  return {type:'ft', msPost:post};
}

function statusForDisplay(m){
  const st = matchStatus(m);
  if(st.type==='upcoming'){
    const mins = st.msPre/60000;
    if(mins < 60) return {label:`${Math.ceil(mins)}m`, cls:'status-upcoming'};
    const h = Math.floor(mins/60), mn = Math.round(mins%60);
    return {label:`${h}h ${mn}m`, cls:'status-upcoming'};
  }
  if(st.type==='live') return {label:'🔴 LIVE', cls:'status-live'};
  return {label:'FT', cls:'status-ft'};
}

// should auto-show which analysis?
function autoAnalysisType(m){
  const st = matchStatus(m);
  if(st.type==='upcoming' && st.msPre < 15*60*1000) return 'pre';
  if(st.type==='live') return 'pre';
  if(st.type==='ft') return 'post';
  return null;
}

// SERVICE WORKER & NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════
// initSW replaced by inline blob approach

async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function scheduleNotif(match, type){
  if(!sw?.active) return;
  const PRE_OFFSET  = 15 * 60 * 1000;  // 15 min before
  const POST_OFFSET = 100 * 60 * 1000; // 100 min after

  const fireAt = type === 'pre'
    ? match.k - PRE_OFFSET
    : match.k + POST_OFFSET;

  if(fireAt < Date.now()) return; // past

  const home = match.h, away = match.a;
  const kickBST = bstTimeStr(match.k);
  const title = type === 'pre'
    ? `⚡ PRE-MATCH: ${home} vs ${away}`
    : `📊 POST-MATCH: ${home} vs ${away}`;
  const body = type === 'pre'
    ? `Kickoff at ${kickBST} BST — tap for pre-match analysis`
    : `Match ended — tap for post-match analysis`;

  sw.active.postMessage({
    type: 'SCHEDULE',
    tag: `wc-${match.id}-${type}`,
    fireAt,
    title,
    body
  });
}

function cancelNotif(match, type){
  if(!sw?.active) return;
  sw.active.postMessage({
    type: 'CANCEL',
    tag: `wc-${match.id}-${type}`
  });
}

async function toggleNotif(matchId){
  const match = MATCHES.find(m=>m.id===matchId);
  if(!match) return;

  if(notifEnabled[matchId]){
    // turn off
    cancelNotif(match, 'pre');
    cancelNotif(match, 'post');
    delete notifEnabled[matchId];
    saveState();
    renderCurrent();
    return;
  }

  // turn on
  if(Notification.permission !== 'granted'){
    const ok = await requestNotifPermission();
    if(!ok){
      alert('Please enable notifications in your browser/OS settings for this site, then try again.');
      return;
    }
  }
  notifEnabled[matchId] = true;
  scheduleNotif(match, 'pre');
  scheduleNotif(match, 'post');
  saveState();
  renderCurrent();
}

// Reschedule all enabled notifications on page load
function rescheduleAll(){
  Object.keys(notifEnabled).forEach(id=>{
    const match = MATCHES.find(m=>m.id===Number(id));
    if(!match) return;
    scheduleNotif(match, 'pre');
    scheduleNotif(match, 'post');
  });
}

async function generateAnalysis(match, type){
  if(!apiKey){
    alert('Enter your Anthropic API key in the Setup tab first.');
    showTab('settings');
    return;
  }

  analysisState = { match, type, text:'', loading:true, error:'' };
  showTab('analysis');
  renderCurrent();

  const home = match.h, away = match.a, venue = match.v, stage = match.s;
  const kickBST = bstTimeStr(match.k);

  const systemPrompt = type === 'pre'
    ? 'You are a world-class football analyst. Give a sharp, structured pre-match analysis for FIFA World Cup 2026. Use web search for the latest squad, form, and tactical data. Keep each section tight — this is for a mobile reader.'
    : 'You are a world-class football analyst. Give a sharp, insightful post-match analysis for FIFA World Cup 2026. Use web search to get the actual result, scorers, and key moments. Be analytical, go beyond the scoreline.';

  const userPrompt = type === 'pre'
    ? `PRE-MATCH: ${home} vs ${away} | WC2026 ${stage}, Group ${match.g}, ${venue}, kickoff ${kickBST} BST

## 1. FIFA RANKINGS
Current rank and recent trend for both teams.

## 2. SQUAD — ${home}
Expected Starting XI with positions and clubs. Key substitutes.

## 3. SQUAD — ${away}
Expected Starting XI with positions and clubs. Key substitutes.

## 4. RECENT FORM
Last 5 matches each — result, opponent, competition.

## 5. PLAYERS TO WATCH
3 key players each side with specific reasons.

## 6. TACTICAL PREVIEW
Expected formations. Key tactical battles. Pressing/defensive approach.

## 7. PREDICTION
Who wins and why. One key factor to watch.

Search for confirmed lineups, injuries, and tactical news.`
    : `POST-MATCH: ${home} vs ${away} | WC2026 ${stage}, Group ${match.g}, ${venue}

## 1. RESULT
Final score, all goalscorers with minute, cards, VAR decisions.

## 2. PLAYERS TO WATCH — VERDICT
Did the pre-identified key players deliver or disappoint?

## 3. GAME-DEFINING MOMENT
The single moment that changed this match.

## 4. ${home} PERFORMANCE
Strengths shown. Weaknesses exposed.

## 5. ${away} PERFORMANCE
Strengths shown. Weaknesses exposed.

## 6. TACTICS & FORMATION
What formation each team ran. Did it work? Key adjustments.

## 7. RATINGS & VERDICT
Top 3 performers with ratings /10. What this result means.

Search for the actual match result, scorers, and tactical data.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2048,
        system: systemPrompt,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);

    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    analysisState = { match, type, text: text || 'No analysis returned.', loading:false, error:'' };
  } catch(err) {
    analysisState = { match, type, text:'', loading:false,
      error: `Failed to generate analysis: ${err.message}` };
  }
  renderCurrent();
}

// MARKDOWN RENDERER
// ═══════════════════════════════════════════════════════════════
function renderMarkdown(text){
  if(!text) return '';
  return text.split('\n').map(line => {
    if(line.startsWith('## '))
      return `<div class="md-h2">${line.slice(3)}</div>`;
    if(line.startsWith('### '))
      return `<div class="md-h3">${line.slice(4)}</div>`;
    if(line.startsWith('- ') || line.startsWith('* '))
      return `<div class="md-bullet">${line.slice(2)}</div>`;
    if(line.trim() === '')
      return '<div class="md-gap"></div>';
    // bold standalone lines
    if(line.startsWith('**') && line.endsWith('**'))
      return `<div class="md-bold">${line.slice(2,-2)}</div>`;
    return `<div class="md-p">${line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</div>`;
  }).join('');
}

    html += `<div class="perm-banner">

        <strong>Enable Notifications</strong>

function matchCard(m, showNotif){
  const st = statusForDisplay(m);
  const mst = matchStatus(m);
  const autoType = autoAnalysisType(m);
  const nEnabled = !!notifEnabled[m.id];
  const isLive = mst.type === 'live';
  const isFT = mst.type === 'ft';
  const canPre = mst.type === 'upcoming' && mst.msPre < 120*60*1000; // 2h window
  const canPost = isFT;

  // countdown
  let countdown = '';
  if(mst.type === 'upcoming'){
    const mins = mst.msPre/60000;
    const isSoon = mins < 30;
    const h = Math.floor(mins/60), mn = Math.floor(mins%60), sc = Math.floor((mst.msPre/1000)%60);
    const pad = n=>String(n).padStart(2,'0');
    const cd = mins < 1 ? `${pad(sc)}s` : mins < 60 ? `${pad(Math.floor(mins))}:${pad(sc)}` : `${h}h ${pad(mn)}m`;
    countdown = `<div class="countdown ${isSoon?'soon':''}">Kickoff in ${cd}</div>`;
  }

  const flag = t => FLAGS[t] || '🌍';

  return `<div class="match-card ${isLive?'live-card':''} ${autoType?'analysis-card':''}">
    <div class="card-top">
      <div class="stage-badge">${m.s}${m.g&&m.g.length<=2?' · Group '+m.g:m.g?' · '+m.g:''} · ${m.v}</div>
      <div class="status-badge ${st.cls}">${st.label}</div>
    </div>
    <div class="teams-row">
      <div class="team-block">
        <div class="team-flag">${flag(m.h)}</div>
        <div class="team-name">${m.h}</div>
      </div>
      <div class="vs-sep">vs</div>
      <div class="team-block">
        <div class="team-flag">${flag(m.a)}</div>
        <div class="team-name">${m.a}</div>
      </div>
    </div>
    <div class="kickoff-row">
      <div class="kickoff-time">${bstTimeStr(m.k)} BST</div>
      ${countdown}
    </div>
    <div class="card-actions">
      <button class="action-btn btn-pre ${m.h==='TBD'||(!canPre&&mst.type!=='live')?'':''}}"
        ${m.h==='TBD'?'disabled':''}
        onclick="generateAnalysis(MATCHES.find(x=>x.id===${m.id}),'pre')">
        ⚡ Pre-Match
      </button>
      <button class="action-btn btn-post ${m.h==='TBD'||!canPost?'':''}"
        ${m.h==='TBD'||!canPost?'disabled':''}
        onclick="generateAnalysis(MATCHES.find(x=>x.id===${m.id}),'post')">
        📊 Post-Match
      </button>
      ${showNotif ? `<button class="action-btn btn-notify ${nEnabled?'active':''}"
        ${m.h==='TBD'?'disabled':''}
        onclick="toggleNotif(${m.id});event.stopPropagation()">
        ${nEnabled?'🔔 ON':'🔕 Alert'}
      </button>` : ''}
    </div>
    ${autoType && m.h!=='TBD' ? `<div style="margin-top:10px">
      <button class="btn btn-gold" style="width:100%;padding:10px"
        onclick="generateAnalysis(MATCHES.find(x=>x.id===${m.id}),'${autoType}')">
        ${autoType==='pre'?'⚡ Open Pre-Match Analysis':'📊 Open Post-Match Analysis'} →
      </button>
    </div>` : ''}
  </div>`;
}

// ── SCHEDULE ───────────────────────────────────────────
function renderSchedule(){
  const el = document.getElementById('mainContent');
  const byDate = {};
  MATCHES.forEach(m => {
    const dk = bstDateKey(m.k);
    if(!byDate[dk]) byDate[dk] = [];
    byDate[dk].push(m);
  });

  let html = '';
  Object.entries(byDate).forEach(([dk, matches])=>{
    html += `<div class="sched-date">${dk}</div>`;
    matches.forEach(m=>{
      const nOn = !!notifEnabled[m.id];
      html += `<div class="sched-row" onclick="generateAnalysis(MATCHES.find(x=>x.id===${m.id}), '${autoAnalysisType(m)||'pre'}')">
        <div class="sched-grp">${m.g}</div>
        <div class="sched-teams">${m.h} vs ${m.a}</div>
        <div class="sched-time">${bstTimeStr(m.k)}</div>
        <div class="sched-notif" onclick="event.stopPropagation();toggleNotif(${m.id})" title="Toggle alert">${m.h==='TBD'?'':'${nOn?'🔔':'🔕'}'}</div>
      </div>`;
    });
  });
  // Fix the template literal issue for notif icon
  el.innerHTML = html + '<div class="safe-bottom"></div>';
  // Re-render properly
  renderScheduleProper();
}

function renderScheduleProper(){
  const el = document.getElementById('mainContent');
  const byDate = {};
  MATCHES.forEach(m => {
    const dk = bstDateKey(m.k);
    if(!byDate[dk]) byDate[dk] = [];
    byDate[dk].push(m);
  });

  let html = '';
  Object.entries(byDate).forEach(([dk, matches])=>{
    html += `<div class="sched-date">${dk}</div>`;
    matches.forEach(m=>{
      const nOn = !!notifEnabled[m.id];
      const atype = autoAnalysisType(m) || 'pre';
      html += `<div class="sched-row" onclick="generateAnalysis(MATCHES.find(x=>x.id===${m.id}),'${atype}')">
        <div class="sched-grp">${m.g}</div>
        <div class="sched-teams">${m.h} vs ${m.a}</div>
        <div class="sched-time">${bstTimeStr(m.k)}</div>
        <div class="sched-notif" onclick="event.stopPropagation();toggleNotif(${m.id})">${m.h!=='TBD'?(nOn?'🔔':'🔕'):''}</div>
      </div>`;
    });
  });
  el.innerHTML = html + '<div class="safe-bottom"></div>';
}

// ── ANALYSIS ───────────────────────────────────────────
function renderAnalysis(){
  if(!analysisState){ showTab('today'); return; }
  const { match:m, type, text, loading, error } = analysisState;
  const el = document.getElementById('mainContent');
  const flag = t => FLAGS[t] || '🌍';

  let body = '';
  if(loading){
    body = `<div class="loading-state">
      <div class="loading-icon">${type==='pre'?'🔍':'📊'}</div>
      <div class="loading-text">Searching live data…</div>
      <div class="loading-sub">${type==='pre'?'Fetching squads, form & tactics':'Fetching result, scorers & match stats'}</div>
      <div class="progress-track"><div class="progress-bar"></div></div>
    </div>`;
  } else if(error){
    body = `<div class="error-box">⚠️ ${error}<br><br>
      <button class="btn btn-gold" onclick="generateAnalysis(MATCHES.find(x=>x.id===${m.id}),'${type}')">Retry</button>
    </div>`;
  } else {
    body = `<div class="md-content">${renderMarkdown(text)}</div>`;
  }

  el.innerHTML = `
    <div class="analysis-header">
      <button class="back-btn" onclick="showTab('today')">← Back</button>
      <div class="analysis-type-badge ${type==='pre'?'badge-pre':'badge-post'}">
        ${type==='pre'?'⚡ PRE-MATCH ANALYSIS':'📊 POST-MATCH ANALYSIS'}
      </div>
      <div class="analysis-teams">
        <div class="analysis-team"><div class="analysis-flag">${flag(m.h)}</div><div class="analysis-tname">${m.h}</div></div>
        <div class="analysis-vs">vs</div>
        <div class="analysis-team"><div class="analysis-flag">${flag(m.a)}</div><div class="analysis-tname">${m.a}</div></div>
      </div>
      <div class="analysis-meta">${m.s} · ${m.v} · ${bstTimeStr(m.k)} BST</div>
    </div>
    <div class="analysis-body">${body}</div>
    <div class="safe-bottom"></div>`;
}

function saveApiKey(){
  apiKey = document.getElementById('apiKeyInput')?.value?.trim() || '';
  saveState();
  const btn = document.querySelector('#mainContent .btn-gold');
  if(btn){ btn.textContent='Saved ✓'; setTimeout(()=>btn.textContent='Save', 1500); }
}

function clearAllNotifs(){
  if(!confirm('Remove all scheduled alerts?')) return;
  Object.keys(notifEnabled).forEach(id=>{
    const m = MATCHES.find(x=>x.id===Number(id));
    if(m){ cancelNotif(m,'pre'); cancelNotif(m,'post'); }
  });
  notifEnabled = {};
  saveState();
  renderSettings();
}

}

// ── Inline Service Worker via blob URL ────────────────
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swCode = `// ═══════════════════════════════════════════════════════
// WC2026 SERVICE WORKER
// Fires scheduled notifications even when app is minimised
// ═══════════════════════════════════════════════════════
const CACHE = 'wc2026-v1';

self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));

// Notification tap → open/focus app
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(
    clients.matchAll({ type: 'window', includeUncontrolled: true }).then(list => {
      if (list.length > 0) return list[0].focus();
      return clients.openWindow('./');
    })
  );
});

// Receive scheduled notification requests from the page
// Stored timers survive tab background (SW keeps running on Android Chrome)
const timers = {};

self.addEventListener('message', e => {
  if (!e.data) return;

  if (e.data.type === 'SCHEDULE') {
    const { tag, fireAt, title, body } = e.data;
    const delay = fireAt - Date.now();
    if (delay <= 0) return;
    if (timers[tag]) clearTimeout(timers[tag]);
    timers[tag] = setTimeout(() => {
      self.registration.showNotification(title, {
        body,
        tag,
        icon: './icon-192.png',
        badge: './icon-192.png',
        vibrate: [300, 100, 300, 100, 300],
        requireInteraction: true,
        silent: false
      });
      delete timers[tag];
    }, delay);
  }

  if (e.data.type === 'CANCEL') {
    const { tag } = e.data;
    if (timers[tag]) { clearTimeout(timers[tag]); delete timers[tag]; }
    self.registration.getNotifications({ tag }).then(n => n.forEach(x => x.close()));
  }

  if (e.data.type === 'PING') {
    // keep-alive from page; also re-confirms SW is active
    e.source && e.source.postMessage({ type: 'PONG', timers: Object.keys(timers) });
  }
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  
  navigator.serviceWorker.register(swUrl, {scope: './'} )
    .then(reg => {
      sw = reg;
      console.log('SW registered via blob');
      setTimeout(rescheduleAll, 1000);
      setInterval(()=>{
        if(reg.active) reg.active.postMessage({type:'PING'});
      }, 20000);
    })
    .catch(e => console.warn('SW blob failed:', e));
})();
</script>
